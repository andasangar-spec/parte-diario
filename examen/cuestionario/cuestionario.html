<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Especial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .quiz-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #e91e63;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .question-block {
            margin-bottom: 25px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .question-block:last-child {
            border-bottom: none;
        }

        p {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .options-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .scale-group {
            display: flex;
            justify-content: space-between;
            max-width: 300px;
            margin-top: 5px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .scale-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        input[type="radio"] {
            accent-color: #e91e63;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .btn-whatsapp:hover {
            background-color: #1bd741;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Cuestionario</h1>
    <form id="quizForm">

        <div class="question-block">
            <p>1. ¿Sabes que te quiero?</p>
            <div class="options-group">
                <label><input type="radio" name="q1" value="Sí" required> Sí</label>
                <label><input type="radio" name="q1" value="No"> No</label>
            </div>
        </div>

        <div class="question-block">
            <p>2. ¿Me quieres?</p>
            <div class="options-group">
                <label><input type="radio" name="q2" value="Sí" required> Sí</label>
                <label><input type="radio" name="q2" value="No"> No</label>
            </div>
        </div>

        <div class="question-block">
            <p>3. ¿Quieres que vivamos juntos?</p>
            <div class="options-group">
                <label><input type="radio" name="q3" value="Sí" required> Sí</label>
                <label><input type="radio" name="q3" value="No"> No</label>
            </div>
        </div>

        <div class="question-block">
            <p>4. Del 1 al 5, ¿cuánto me quieres?</p>
            <div class="scale-group">
                <div class="scale-item"><label>1</label><input type="radio" name="q4" value="1" required></div>
                <div class="scale-item"><label>2</label><input type="radio" name="q4" value="2"></div>
                <div class="scale-item"><label>3</label><input type="radio" name="q4" value="3"></div>
                <div class="scale-item"><label>4</label><input type="radio" name="q4" value="4"></div>
                <div class="scale-item"><label>5</label><input type="radio" name="q4" value="5"></div>
            </div>
        </div>

        <div class="question-block">
            <p>5. Del 1 al 5, ¿qué nivel de entendimiento crees que tenemos?</p>
            <div class="scale-group">
                <div class="scale-item"><label>1</label><input type="radio" name="q5" value="1" required></div>
                <div class="scale-item"><label>2</label><input type="radio" name="q5" value="2"></div>
                <div class="scale-item"><label>3</label><input type="radio" name="q5" value="3"></div>
                <div class="scale-item"><label>4</label><input type="radio" name="q5" value="4"></div>
                <div class="scale-item"><label>5</label><input type="radio" name="q5" value="5"></div>
            </div>
        </div>

        <div class="question-block">
            <p>6. ¿Tienes dudas sobre nosotros?</p>
            <div class="options-group">
                <label><input type="radio" name="q6" value="Sí" required> Sí</label>
                <label><input type="radio" name="q6" value="No"> No</label>
            </div>
        </div>

        <div class="question-block">
            <p>7. ¿Necesitas que hablemos más?</p>
            <div class="options-group">
                <label><input type="radio" name="q7" value="Sí" required> Sí</label>
                <label><input type="radio" name="q7" value="No"> No</label>
            </div>
        </div>

        <button type="button" class="btn-whatsapp" onclick="enviarRespuestas()">
            Enviar por WhatsApp
        </button>

    </form>
</div>

<script>
function enviarRespuestas() {
    const form = document.getElementById('quizForm');
    
    // 1. Forzar la validación visual del navegador primero
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    // 2. Extraer los datos de forma segura con FormData para evitar errores de JS
    const formData = new FormData(form);
    
    const preguntas = {
        q1: "1. ¿Sabes que te quiero?",
        q2: "2. ¿Me quieres?",
        q3: "3. ¿Quieres que vivamos juntos?",
        q4: "4. ¿Cuánto me quieres? (1 al 5):",
        q5: "5. ¿Nivel de entendimiento? (1 al 5):",
        q6: "6. ¿Tienes dudas sobre nosotros?",
        q7: "7. ¿Necesitas que hablemos más?"
    };

    let mensaje = "*Respuestas del Cuestionario*\n\n";
    let faltaAlguna = false;

    // Recorrer las preguntas de manera segura
    for (const key in preguntas) {
        const respuesta = formData.get(key);
        if (!respuesta) {
            faltaAlguna = true;
            break;
        }
        mensaje += `*${preguntas[key]}*\n${respuesta}\n\n`;
    }

    if (faltaAlguna) {
        alert("Por favor, responde a todas las preguntas antes de continuar.");
        return;
    }

    // Limpiar espacios en blanco al final del mensaje
    mensaje = mensaje.trim();

    // 3. Codificar el mensaje para la URL
    const textoCodificado = encodeURIComponent(mensaje);
    
    // Enlace directo usando la API clásica de WhatsApp que no falla en navegadores web integrados
    const enlaceWhatsApp = "https://api.whatsapp.com/send?text=" + textoCodificado;

    // 4. Redirección directa en la misma pestaña para burlar bloqueadores de popups
    window.location.href = enlaceWhatsApp;
}
</script>

</body>
                                          </html>
