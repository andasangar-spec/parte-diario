<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte de Trabajo A5 Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --blue: #1a73e8; --gray: #5f6368; --light: #f8f9fa; }
        body { font-family: Arial, sans-serif; background: #eee; margin: 0; padding: 0; }
        
        #parte-completo { 
            width: 148mm; 
            min-height: 210mm; 
            margin: auto; 
            background: white; 
            padding: 8mm; 
            box-sizing: border-box;
        }

        h2 { text-align: center; color: var(--blue); margin: 0 0 8px 0; font-size: 16px; border-bottom: 2px solid var(--blue); padding-bottom: 5px; }
        
        .header-section { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        label { display: block; font-size: 9px; font-weight: bold; color: var(--gray); margin-bottom: 2px; }
        input, select, textarea { width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 10px; box-sizing: border-box; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--light); font-size: 10px; padding: 5px; border: 1px solid #ccc; }
        td { border: 1px solid #ccc; padding: 1px; text-align: center; height: 22px; }
        
        /* Fila de Total Optimizado para Impresión */
        .total-row { 
            background: #ffffff !important; 
            color: #000000 !important;
            font-weight: bold; 
            font-size: 13px; /* Letra más grande */
        }
        .total-row td {
            border: 2px solid #000000 !important; /* Marco negro grueso */
            padding: 5px 2px;
        }

        .obs-section { margin-top: 8px; }
        .obs-section textarea { width: 100%; height: 40px; resize: none; font-family: inherit; }

        .km-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; background: var(--light); padding: 6px; border-radius: 4px; }
        
        .no-print { max-width: 148mm; margin: 15px auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 5px; }
        button { padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-pdf { background: #d93025; grid-column: span 3; }
        .btn-wa { background: #188038; } .btn-email { background: #1a73e8; } .btn-clear { background: #5f6368; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="parte-completo">
    <h2>PARTE DE TRABAJO DIARIO</h2>

    <div class="header-section">
        <div><label>PROFESOR</label><input type="text" id="prof"></div>
        <div><label>FECHA</label><input type="date" id="fecha"></div>
        <div><label>MATRÍCULA</label><input type="text" id="mat"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 22%;">HORA</th>
                <th style="width: 60%;">ALUMNO</th>
                <th style="width: 18%;">CLASES</th>
            </tr>
        </thead>
        <tbody id="tabla-filas"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="2" style="text-align: right; padding-right: 15px;">TOTAL CLASES DEL DÍA:</td>
                <td id="suma-total">0</td>
            </tr>
        </tfoot>
    </table>

    <div class="obs-section">
        <label>OBSERVACIONES</label>
        <textarea id="obs" placeholder="Escribe aquí notas o incidencias..."></textarea>
    </div>

    <div class="km-section">
        <div><label>KM INICIO</label><input type="number" id="kmi" oninput="calcKm()"></div>
        <div><label>KM FINAL</label><input type="number" id="kmf" oninput="calcKm()"></div>
        <div><label>TOTAL KM</label><input type="text" id="kmt" readonly style="background:#e8f0fe; text-align:center; font-weight:bold;"></div>
    </div>
</div>

<div class="no-print">
    <button class="btn-pdf" onclick="generarPDF()">GENERAR PDF (A5)</button>
    <button class="btn-wa" onclick="enviarWA()">WHATSAPP</button>
    <button class="btn-email" onclick="enviarEmail()">EMAIL</button>
    <button class="btn-clear" onclick="limpiarForm()">LIMPIAR</button>
</div>

<script>
    function genHoras() {
        let opt = '<option value="" selected>-</option>';
        for(let hh=6; hh<=22; hh++) {
            for(let mm=0; mm<60; mm+=15) {
                let s = `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
                opt += `<option value="${s}">${s}</option>`;
            }
        }
        return opt;
    }

    function init() {
        const tabla = document.getElementById('tabla-filas');
        let html = '';
        for(let i=1; i<=15; i++) {
            html += `<tr>
                <td><select style="border:none;">${genHoras()}</select></td>
                <td><input type="text" style="border:none; width:95%;"></td>
                <td><select class="clase-select" onchange="sumarClases()" style="border:none;">
                    <option value="0" selected>-</option>
                    ${[1,2,3,4].map(n=>`<option value="${n}">${n}</option>`).join('')}
                </select></td>
            </tr>`;
        }
        tabla.innerHTML = html;
        document.getElementById('fecha').valueAsDate = new Date();
    }

    function sumarClases() {
        let total = 0;
        document.querySelectorAll('.clase-select').forEach(sel => {
            total += parseInt(sel.value) || 0;
        });
        document.getElementById('suma-total').innerText = total;
    }

    function calcKm() {
        const i = parseFloat(document.getElementById('kmi').value) || 0;
        const f = parseFloat(document.getElementById('kmf').value) || 0;
        document.getElementById('kmt').value = (f - i) > 0 ? (f - i) : 0;
    }

    function generarPDF() {
        const element = document.getElementById('parte-completo');
        const nombreProf = document.getElementById('prof').value.trim() || "profesor";
        const fechaInput = document.getElementById('fecha').value; 
        let fechaFormateada = "SinFecha";

        if (fechaInput) {
            const d = new Date(fechaInput);
            const dia = String(d.getDate()).padStart(2, '0');
            const mes = String(d.getMonth() + 1).padStart(2, '0');
            const año = String(d.getFullYear()).slice(-2);
            fechaFormateada = `${dia}${mes}${año}`;
        }

        const nombreArchivo = `${nombreProf.replace(/\s+/g, '_')}_${fechaFormateada}.pdf`;

        const opt = {
            margin: 0,
            filename: nombreArchivo,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'mm', format: 'a5', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function enviarWA() { window.open(`https://wa.me/?text=Envío mi parte de trabajo diario.`, '_blank'); }
    function enviarEmail() { window.location.href = `mailto:?subject=Parte de Trabajo&body=Adjunto envío mi parte.`; }
    function limpiarForm() { if(confirm("¿Borrar todos los datos?")) location.reload(); }

    init();
</script>

</body>
</html>
