<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte de Trabajo Diario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Garantiza el área táctil mínima recomendada para dispositivos móviles */
        input, select, button {
            min-height: 48px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-12">

    <div class="max-w-4xl mx-auto px-4 pt-6" id="contenido-completo">
        <header class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <h1 class="text-2xl font-bold text-indigo-900 text-center uppercase tracking-wider mb-6">
                Parte de Trabajo Diario
            </h1>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Fecha</label>
                    <input type="date" id="fecha" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Profesor / Instructor</label>
                    <input type="text" id="profesor" placeholder="Nombre del profesor" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Matrícula Vehículo</label>
                    <input type="text" id="matricula" placeholder="1234-ABC" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">KM Inicial</label>
                    <input type="number" id="kmInicial" placeholder="0" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">KM Final</label>
                    <input type="number" id="kmFinal" placeholder="0" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-indigo-600 uppercase mb-1">Total KM Recorridos</label>
                    <div id="kmTotales" class="w-full bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold rounded-lg px-3 py-2 flex items-center">
                        0 km
                    </div>
                </div>
            </div>
        </header>

        <main class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
            <div class="p-6 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-slate-700 uppercase tracking-wide text-sm">Registros de Clases</h2>
                <button onclick="agregarFila()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm px-4 py-2 rounded-xl transition-all shadow-sm flex items-center gap-2">
                    ➕ Añadir Clase
                </button>
            </div>

            <div class="hidden md:grid grid-cols-12 bg-slate-100/70 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider p-4">
                <div class="col-span-2">Hora</div>
                <div class="col-span-5">Alumno</div>
                <div class="col-span-2">Permiso</div>
                <div class="col-span-2 text-center">Nº Clases</div>
                <div class="col-span-1 text-center">Acción</div>
            </div>

            <div id="tabla-cuerpo" class="p-4 md:p-0 bg-slate-50 md:bg-white space-y-4 md:space-y-0 divide-y-0 md:divide-y md:divide-slate-100">
                </div>

            <div class="p-4 bg-slate-900 text-white flex justify-between items-center font-bold text-lg">
                <span class="text-slate-400 text-sm uppercase tracking-wider">Total Clases de la Jornada:</span>
                <span id="total-clases" class="text-emerald-400 text-2xl">0</span>
            </div>
        </main>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <button onclick="compartirParte()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                📲 Compartir por WhatsApp
            </button>
            <button onclick="exportarPDF()" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                📄 Descargar PDF (A5)
            </button>
            <button onclick="limpiarJornada()" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 font-semibold rounded-xl border border-rose-200 transition-all flex items-center justify-center gap-2">
                🗑️ Limpiar Jornada
            </button>
        </div>
    </div>

    <script>
        let estadoJornada = {
            cabecera: { fecha: '', profesor: '', matricula: '', kmInicial: 0, kmFinal: 0 },
            clases: []
        };

        // Menú desplegable con los permisos solicitados
        const opcionesPermisos = ['AM', 'A1', 'A2', 'A', 'B', 'BE', 'C', 'CE', 'D'];

        window.addEventListener('DOMContentLoaded', () => {
            const datosGuardados = localStorage.getItem('parteDiarioData');
            if (datosGuardados) {
                estadoJornada = JSON.parse(datosGuardados);
                mapearDatosACabeceraInputs();
            } else {
                document.getElementById('fecha').valueToDate = new Date();
                estadoJornada.cabecera.fecha = new Date().toISOString().split('T')[0];
            }
            
            configurarEscuchadoresCabecera();
            renderizarTabla();
            calcularTotales();
        });

        function configurarEscuchadoresCabecera() {
            const campos = ['fecha', 'profesor', 'matricula', 'kmInicial', 'kmFinal'];
            campos.forEach(campo => {
                document.getElementById(campo).addEventListener('input', (e) => {
                    estadoJornada.cabecera[campo] = e.target.value;
                    calcularTotales();
                    guardarEnStorage();
                });
            });
        }

        function mapearDatosACabeceraInputs() {
            Object.keys(estadoJornada.cabecera).forEach(key => {
                const input = document.getElementById(key);
                if (input) input.value = estadoJornada.cabecera[key];
            });
        }

        function renderizarTabla() {
            const cuerpo = document.getElementById('tabla-cuerpo');
            cuerpo.innerHTML = '';

            estadoJornada.clases.forEach((clase, index) => {
                const elementoFila = document.createElement('div');
                
                // Diseño responsivo: Tarjetas verticales en móvil, celdas de tabla alineadas en PC
                elementoFila.className = "bg-white md:bg-transparent rounded-xl md:rounded-none p-4 md:p-4 shadow-sm md:shadow-none border border-slate-100 md:border-none md:grid md:grid-cols-12 md:gap-4 items-center hover:bg-slate-50/80 transition-all flex flex-col gap-3 md:flex-row";

                let opcionesHTML = `<option value="">--</option>`;
                opcionesPermisos.forEach(permiso => {
                    opcionesHTML += `<option value="${permiso}" ${clase.permiso === permiso ? 'selected' : ''}>${permiso}</option>`;
                });

                elementoFila.innerHTML = `
                    <div class="w-full md:col-span-2 flex justify-between items-center md:block">
                        <span class="text-xs font-bold text-slate-400 uppercase md:hidden">Hora</span>
                        <input type="time" value="${clase.hora || ''}" oninput="actualizarFila(${index}, 'hora', this.value)" class="bg-slate-50 md:bg-transparent border border-slate-200 md:border-b md:border-transparent focus:border-indigo-500 focus:outline-none rounded-lg md:rounded-none px-2 py-1 text-sm md:text-base w-32 md:w-full text-center md:text-left">
                    </div>

                    <div class="w-full md:col-span-5 flex flex-col md:block">
                        <span class="text-xs font-bold text-slate-400 uppercase md:hidden mb-1">Alumno</span>
                        <input type="text" placeholder="Nombre completo del alumno" value="${clase.alumno || ''}" oninput="actualizarFila(${index}, 'alumno', this.value)" class="w-full bg-slate-50 md:bg-transparent border border-slate-200 md:border-b md:border-transparent focus:border-indigo-500 focus:outline-none rounded-lg md:rounded-none px-3 py-2 md:px-0 md:py-1 text-base font-medium text-slate-700">
                    </div>

                    <div class="w-full md:col-span-2 flex justify-between items-center md:block">
                        <span class="text-xs font-bold text-slate-400 uppercase md:hidden">Permiso</span>
                        <select onchange="actualizarFila(${index}, 'permiso', this.value)" class="w-32 md:w-full bg-slate-50 border border-slate-200 rounded-lg md:rounded p-2 md:p-1 text-sm focus:outline-none focus:border-indigo-500 font-semibold text-center md:text-left">
                            ${opcionesHTML}
                        </select>
                    </div>

                    <div class="w-full md:col-span-2 flex justify-between items-center md:block">
                        <span class="text-xs font-bold text-slate-400 uppercase md:hidden">Nº Clases</span>
                        <input type="number" min="0" placeholder="0" value="${clase.numClases || ''}" oninput="actualizarFila(${index}, 'numClases', this.value)" class="w-20 md:w-full bg-slate-50 md:bg-transparent border border-slate-200 md:border-b md:border-transparent focus:border-indigo-500 focus:outline-none rounded-lg md:rounded-none px-2 py-1 font-bold text-center text-lg md:text-base text-indigo-600">
                    </div>

                    <div class="w-full md:col-span-1 text-right md:text-center mt-2 md:mt-0 pt-2 md:pt-0 border-t border-slate-100 md:border-none">
                        <button onclick="eliminarFila(${index})" class="text-rose-500 hover:text-rose-700 font-semibold text-sm md:text-lg flex items-center justify-center gap-1 w-full md:w-auto bg-rose-50 md:bg-transparent py-2 md:py-0 rounded-lg md:rounded-none transition-colors">
                            <span class="md:hidden text-xs uppercase font-bold text-rose-600">Eliminar Fila</span> ✕
                        </button>
                    </div>
                `;
                cuerpo.appendChild(elementoFila);
            });
        }

        function agregarFila() {
            estadoJornada.clases.push({ hora: '', alumno: '', permiso: '', numClases: 1 });
            renderizarTabla();
            calcularTotales();
            guardarEnStorage();
        }

        function actualizarFila(index, campo, valor) {
            estadoJornada.clases[index][campo] = valor;
            if (campo === 'numClases') calcularTotales();
            guardarEnStorage();
        }

        function eliminarFila(index) {
            estadoJornada.clases.splice(index, 1);
            renderizarTabla();
            calcularTotales();
            guardarEnStorage();
        }

        function calcularTotales() {
            const ki = parseFloat(estadoJornada.cabecera.kmInicial) || 0;
            const kf = parseFloat(estadoJornada.cabecera.kmFinal) || 0;
            const diff = kf - ki;
            document.getElementById('kmTotales').innerText = diff >= 0 ? `${diff} km` : 'Error en KM';

            const totalClases = estadoJornada.clases.reduce((sum, item) => sum + (parseInt(item.numClases) || 0), 0);
            document.getElementById('total-clases').innerText = totalClases;
        }

        function guardarEnStorage() {
            localStorage.setItem('parteDiarioData', JSON.stringify(estadoJornada));
        }

        function limpiarJornada() {
            if (confirm('¿Estás seguro de que deseas vaciar todos los campos del parte diario?')) {
                localStorage.removeItem('parteDiarioData');
                estadoJornada = {
                    cabecera: { fecha: new Date().toISOString().split('T')[0], profesor: '', matricula: '', kmInicial: 0, kmFinal: 0 },
                    clases: []
                };
                mapearDatosACabeceraInputs();
                renderizarTabla();
                calcularTotales();
            }
        }

        // GENERACIÓN PROFESIONAL DE ARCHIVO PDF (OPTIMIZADO PARA A5 EN UNA SOLA PÁGINA)
        function exportarPDF() {
            const elemento = document.getElementById('contenido-completo');
            
            // 1. Ocultar temporalmente los botones de acción para que no salgan en el PDF
            const botones = document.querySelectorAll('button');
            botones.forEach(b => b.style.display = 'none');

            // 2. Almacenar estilos originales de responsive para restaurarlos después
            const anchoOriginal = elemento.style.width;
            const margenOriginal = elemento.style.margin;

            // 3. Forzar diseño compacto optimizado para la relación de aspecto A5
            elemento.style.width = "520px"; 
            elemento.style.margin = "0 auto";

            // 4. Eliminar temporalmente las restricciones de desbordamiento que cortan los datos
            const elementosConOverflow = elemento.querySelectorAll('.overflow-hidden, .overflow-x-auto');
            elementosConOverflow.forEach(el => {
                el.classList.remove('overflow-hidden', 'overflow-x-auto');
            });

            // 5. Configuración estricta para Lienzo A5 en una sola página
            const opcionesConfig = {
                margin:       6, 
                filename:     `Parte_Diario_${estadoJornada.cabecera.fecha || 'sin_fecha'}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2,          
                    scrollY: 0,        
                    scrollX: 0,
                    useCORS: true,     
                    logging: false
                },
                jsPDF:        { unit: 'mm', format: 'a5', orientation: 'portrait' },
                pagebreak:    { mode: 'avoid' } 
            };

            // 6. Ejecutar renderizado y restauración de la UI de la Web App
            html2pdf().from(elemento).set(opcionesConfig).save().then(() => {
                botones.forEach(b => b.style.display = '');
                elemento.style.width = anchoOriginal;
                elemento.style.margin = margenOriginal;
                
                elementosConOverflow.forEach(el => {
                    if (el.tagName === 'MAIN') el.classList.add('overflow-hidden');
                    if (el.tagName === 'DIV') el.classList.add('overflow-x-auto');
                });
            }).catch(err => {
                console.error("Error optimizando el PDF:", err);
                botones.forEach(b => b.style.display = '');
                elemento.style.width = anchoOriginal;
                elemento.style.margin = margenOriginal;
            });
        }

        function compartirParte() {
            const ki = parseFloat(estadoJornada.cabecera.kmInicial) || 0;
            const kf = parseFloat(estadoJornada.cabecera.kmFinal) || 0;
            const totalClases = document.getElementById('total-clases').innerText;
            
            let textoResumen = `*RESUMEN PARTE DIARIO*\n`;
            textoResumen += `📅 Fecha: ${estadoJornada.cabecera.fecha || '-'}\n`;
            textoResumen += `👨‍🏫 Profesor: ${estadoJornada.cabecera.profesor || '-'}\n`;
            textoResumen += `🚗 Matrícula: ${estadoJornada.cabecera.matricula || '-'}\n`;
            textoResumen += `🛣️ KM Recorridos: ${kf - ki} km\n`;
            textoResumen += `📚 Total Clases: ${totalClases}\n\n`;
            textoResumen += `*DETALLE DE CLASES:*\n`;

            estadoJornada.clases.forEach(c => {
                if(c.alumno) {
                    textoResumen += `• ${c.hora || '00:00'} | ${c.alumno} | Permiso: ${c.permiso || 'N/A'} | Clases: ${c.numClases}\n`;
                }
            });

            if (navigator.share) {
                navigator.share({
                    title: 'Parte de Trabajo Diario',
                    text: textoResumen
                }).catch(console.error);
            } else {
                const urlWhatsapp = `https://api.whatsapp.com/send?text=${encodeURIComponent(textoResumen)}`;
                window.open(urlWhatsapp, '_blank');
            }
        }
    </script>
</body>
</html>
